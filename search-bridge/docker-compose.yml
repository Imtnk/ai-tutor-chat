services:
  nginx:
    image: nginx:alpine
    ports:
      - "8888:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - searxng

  searxng:
    image: ghcr.io/searxng/searxng:latest
    expose:
      - "8080"
    environment:
      SEARXNG_BASE_URL: http://127.0.0.1:8888/
    volumes:
      - ./config:/etc/searxng
      - ./data:/var/cache/searxng
